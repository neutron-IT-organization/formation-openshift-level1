<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="340" fill="#F8F9FA" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Injection de ConfigMaps et Secrets dans un Pod</text>

  <!-- ConfigMap box -->
  <rect x="30" y="65" width="200" height="150" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="93" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1">ConfigMap</text>
  <text x="130" y="111" text-anchor="middle" font-size="11" fill="#1565C0">Données non sensibles</text>
  <rect x="50" y="122" width="160" height="22" rx="4" fill="#BBDEFB"/>
  <text x="130" y="137" text-anchor="middle" font-size="11" fill="#0D47A1">welcome_message: "Bonjour"</text>
  <rect x="50" y="150" width="160" height="22" rx="4" fill="#BBDEFB"/>
  <text x="130" y="165" text-anchor="middle" font-size="11" fill="#0D47A1">app_mode: "production"</text>
  <rect x="50" y="178" width="160" height="22" rx="4" fill="#BBDEFB"/>
  <text x="130" y="193" text-anchor="middle" font-size="11" fill="#0D47A1">config.properties: ...</text>

  <!-- Secret box -->
  <rect x="30" y="235" width="200" height="90" rx="10" fill="#FCE4EC" stroke="#C62828" stroke-width="2"/>
  <text x="130" y="260" text-anchor="middle" font-size="14" font-weight="bold" fill="#B71C1C">🔒 Secret</text>
  <text x="130" y="278" text-anchor="middle" font-size="11" fill="#C62828">Données sensibles (base64)</text>
  <rect x="50" y="288" width="160" height="22" rx="4" fill="#FFCDD2"/>
  <text x="130" y="303" text-anchor="middle" font-size="11" fill="#B71C1C">api_token: d2VsY29t...</text>

  <!-- Pod box (center) -->
  <rect x="290" y="80" width="220" height="195" rx="12" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="400" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#4A148C">Pod</text>
  <text x="400" y="126" text-anchor="middle" font-size="11" fill="#6A1B9A">welcome-app</text>

  <!-- Env vars inside pod -->
  <rect x="305" y="138" width="190" height="120" rx="8" fill="white" stroke="#CE93D8" stroke-width="1.5"/>
  <text x="400" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A148C">Variables d'environnement</text>
  <text x="318" y="176" font-size="10" fill="#1565C0">WELCOME_MESSAGE=Bonjour</text>
  <text x="318" y="193" font-size="10" fill="#1565C0">APP_MODE=production</text>
  <text x="318" y="210" font-size="10" fill="#B71C1C">API_TOKEN=welcomeToken123</text>
  <text x="318" y="228" font-size="10" fill="#666">...</text>
  <text x="318" y="248" font-size="10" fill="#555" font-style="italic">➡ oc exec pod -- env</text>

  <!-- Arrows ConfigMap → Pod -->
  <line x1="230" y1="120" x2="288" y2="160" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue3)"/>
  <text x="255" y="138" font-size="10" fill="#1565C0" transform="rotate(-20,255,138)">env var</text>

  <line x1="230" y1="155" x2="288" y2="175" stroke="#1565C0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue3)"/>
  <text x="248" y="158" font-size="10" fill="#1565C0">volume</text>

  <!-- Arrow Secret → Pod -->
  <line x1="230" y1="265" x2="288" y2="210" stroke="#C62828" stroke-width="2" marker-end="url(#arrowRed3)"/>
  <text x="247" y="240" font-size="10" fill="#C62828" transform="rotate(-20,247,240)">env var</text>

  <!-- Volume mount box on right -->
  <rect x="570" y="80" width="200" height="110" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="670" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Volume Mount</text>
  <text x="670" y="123" text-anchor="middle" font-size="11" fill="#2E7D32">Fichier dans le pod :</text>
  <text x="670" y="141" text-anchor="middle" font-size="10" fill="#388E3C">/etc/config/config.properties</text>
  <text x="670" y="158" text-anchor="middle" font-size="10" fill="#388E3C">Mis à jour automatiquement</text>
  <text x="670" y="175" text-anchor="middle" font-size="10" fill="#388E3C">si le ConfigMap change</text>

  <!-- Arrow Pod → Volume -->
  <line x1="510" y1="145" x2="568" y2="145" stroke="#388E3C" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen3)"/>
  <text x="538" y="137" font-size="10" fill="#1B5E20">volume</text>

  <!-- Difference note -->
  <rect x="570" y="210" width="200" height="110" rx="10" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="670" y="233" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">⚠ Env var vs Volume</text>
  <text x="580" y="253" font-size="10" fill="#333">Env var : statique au démarrage</text>
  <text x="580" y="268" font-size="10" fill="#333">→ Redémarrer pour màj</text>
  <text x="580" y="288" font-size="10" fill="#333">Volume : dynamique</text>
  <text x="580" y="303" font-size="10" fill="#333">→ Mise à jour automatique</text>

  <defs>
    <marker id="arrowBlue3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowRed3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C62828"/>
    </marker>
    <marker id="arrowGreen3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388E3C"/>
    </marker>
  </defs>
</svg>
