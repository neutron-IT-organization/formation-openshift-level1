<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 278" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#BDBDBD"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="278" rx="10" fill="#F5F7FA"/>

  <!-- ══════════════════════════════
       Deployment
  ══════════════════════════════ -->
  <rect x="18" y="90" width="148" height="80" rx="9" fill="#202cac"/>
  <!-- top accent bar -->
  <rect x="18" y="90" width="148" height="6" rx="9" fill="#3949AB"/>
  <rect x="18" y="93" width="148" height="3" fill="#3949AB"/>
  <text x="92" y="122" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Deployment</text>
  <text x="92" y="141" text-anchor="middle" font-size="11" fill="#9FA8DA">my-deployment</text>
  <text x="92" y="158" text-anchor="middle" font-size="10" fill="#7986CB">Contrôleur</text>

  <!-- Arrow: Deployment → Active RS -->
  <line x1="166" y1="112" x2="238" y2="89" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="196" y="95" text-anchor="middle" font-size="10" fill="#444" font-style="italic">gère</text>

  <!-- Arrow: Deployment → Previous RS (dashed gray) -->
  <line x1="166" y1="152" x2="238" y2="195" stroke="#BDBDBD" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="197" y="183" text-anchor="middle" font-size="10" fill="#BDBDBD" font-style="italic">conserve</text>

  <!-- ══════════════════════════════
       Active ReplicaSet
  ══════════════════════════════ -->
  <rect x="243" y="54" width="192" height="70" rx="9" fill="#1565C0"/>
  <rect x="243" y="54" width="192" height="6" rx="9" fill="#1976D2"/>
  <rect x="243" y="57" width="192" height="3" fill="#1976D2"/>
  <text x="339" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ReplicaSet (actif)</text>
  <text x="339" y="100" text-anchor="middle" font-size="11" fill="#BBDEFB">replicas: 2</text>
  <!-- progress dots -->
  <circle cx="309" cy="113" r="5" fill="#42A5F5"/>
  <circle cx="329" cy="113" r="5" fill="#42A5F5"/>
  <circle cx="349" cy="113" r="5" fill="#1976D2"/>
  <circle cx="369" cy="113" r="5" fill="#1976D2"/>

  <!-- Fork connector: Active RS → Pods -->
  <!-- Horizontal stem from RS right edge center -->
  <line x1="435" y1="89" x2="468" y2="89" stroke="#444" stroke-width="1.5"/>
  <!-- Vertical bar of the fork -->
  <line x1="468" y1="68" x2="468" y2="121" stroke="#444" stroke-width="1.5"/>
  <!-- Arrow to Pod 1 -->
  <line x1="468" y1="68" x2="493" y2="68" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Arrow to Pod 2 -->
  <line x1="468" y1="121" x2="493" y2="121" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- "crée" label -->
  <text x="451" y="46" text-anchor="middle" font-size="10" fill="#444" font-style="italic">crée</text>

  <!-- ══════════════════════════════
       Pod 1
  ══════════════════════════════ -->
  <rect x="493" y="50" width="210" height="37" rx="7" fill="#E8EAF6" stroke="#202cac" stroke-width="1.5"/>
  <circle cx="513" cy="68" r="11" fill="#202cac"/>
  <text x="513" y="72" text-anchor="middle" font-size="9" fill="white" font-weight="bold">v1</text>
  <text x="535" y="73" font-size="12" fill="#333" font-weight="bold">Pod-1</text>
  <circle cx="635" cy="66" r="5" fill="#4CAF50"/>
  <text x="644" y="71" font-size="10" fill="#4CAF50">Running</text>

  <!-- ══════════════════════════════
       Pod 2
  ══════════════════════════════ -->
  <rect x="493" y="103" width="210" height="37" rx="7" fill="#E8EAF6" stroke="#202cac" stroke-width="1.5"/>
  <circle cx="513" cy="121" r="11" fill="#202cac"/>
  <text x="513" y="125" text-anchor="middle" font-size="9" fill="white" font-weight="bold">v1</text>
  <text x="535" y="126" font-size="12" fill="#333" font-weight="bold">Pod-2</text>
  <circle cx="635" cy="119" r="5" fill="#4CAF50"/>
  <text x="644" y="124" font-size="10" fill="#4CAF50">Running</text>

  <!-- ══════════════════════════════
       Previous ReplicaSet (grayed)
  ══════════════════════════════ -->
  <rect x="243" y="165" width="228" height="60" rx="9" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="357" y="191" text-anchor="middle" font-size="12" font-weight="bold" fill="#9E9E9E">ReplicaSet (précédent)</text>
  <text x="357" y="210" text-anchor="middle" font-size="10" fill="#BDBDBD">0 réplicas — conservé pour rollback</text>

  <!-- ══════════════════════════════
       Bottom note
  ══════════════════════════════ -->
  <rect x="18" y="242" width="684" height="24" rx="6" fill="#E8EAF6"/>
  <text x="360" y="258" text-anchor="middle" font-size="11" fill="#3949AB">Le rollback réactive l'ancien ReplicaSet sans recréer les pods de zéro</text>
</svg>
