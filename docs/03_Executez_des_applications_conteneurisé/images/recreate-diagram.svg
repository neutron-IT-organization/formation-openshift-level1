<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="400" rx="8" fill="#F5F5F5"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Stratégie Recreate</text>

  <!-- ══════════════════════════════
       Step 1 : Etat initial
  ══════════════════════════════ -->
  <rect x="30" y="60" width="220" height="290" rx="10" fill="white" stroke="#202cac" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="35" rx="10" fill="#202cac"/>
  <rect x="30" y="85" width="220" height="10" fill="#202cac"/>
  <text x="140" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Etape 1 : Etat initial</text>

  <rect x="55" y="115" width="170" height="55" rx="8" fill="#E8EAF6" stroke="#202cac" stroke-width="1.5"/>
  <circle cx="80" cy="142" r="15" fill="#202cac"/>
  <text x="80" y="147" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v1</text>
  <text x="140" y="138" font-size="13" fill="#333" font-weight="bold">Pod 1</text>
  <text x="140" y="153" font-size="11" fill="#666">version 1</text>

  <rect x="55" y="180" width="170" height="55" rx="8" fill="#E8EAF6" stroke="#202cac" stroke-width="1.5"/>
  <circle cx="80" cy="207" r="15" fill="#202cac"/>
  <text x="80" y="212" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v1</text>
  <text x="140" y="203" font-size="13" fill="#333" font-weight="bold">Pod 2</text>
  <text x="140" y="218" font-size="11" fill="#666">version 1</text>

  <rect x="55" y="245" width="170" height="55" rx="8" fill="#E8EAF6" stroke="#202cac" stroke-width="1.5"/>
  <circle cx="80" cy="272" r="15" fill="#202cac"/>
  <text x="80" y="277" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v1</text>
  <text x="140" y="268" font-size="13" fill="#333" font-weight="bold">Pod 3</text>
  <text x="140" y="283" font-size="11" fill="#666">version 1</text>

  <!-- Arrow 1 → 2 -->
  <line x1="255" y1="200" x2="285" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ══════════════════════════════
       Step 2 : Interruption
  ══════════════════════════════ -->
  <rect x="290" y="60" width="220" height="290" rx="10" fill="white" stroke="#E53935" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="35" rx="10" fill="#E53935"/>
  <rect x="290" y="85" width="220" height="10" fill="#E53935"/>
  <text x="400" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Etape 2 : Interruption</text>

  <!-- Pod 1 Terminating -->
  <rect x="315" y="115" width="170" height="55" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="340" cy="142" r="15" fill="#9E9E9E"/>
  <line x1="333" y1="135" x2="347" y2="149" stroke="white" stroke-width="2.2"/>
  <line x1="347" y1="135" x2="333" y2="149" stroke="white" stroke-width="2.2"/>
  <text x="400" y="138" font-size="13" fill="#9E9E9E" font-weight="bold">Pod 1</text>
  <text x="400" y="153" font-size="11" fill="#E53935">Terminating</text>

  <!-- Pod 2 Terminating -->
  <rect x="315" y="180" width="170" height="55" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="340" cy="207" r="15" fill="#9E9E9E"/>
  <line x1="333" y1="200" x2="347" y2="214" stroke="white" stroke-width="2.2"/>
  <line x1="347" y1="200" x2="333" y2="214" stroke="white" stroke-width="2.2"/>
  <text x="400" y="203" font-size="13" fill="#9E9E9E" font-weight="bold">Pod 2</text>
  <text x="400" y="218" font-size="11" fill="#E53935">Terminating</text>

  <!-- Pod 3 Terminating -->
  <rect x="315" y="245" width="170" height="55" rx="8" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="340" cy="272" r="15" fill="#9E9E9E"/>
  <line x1="333" y1="265" x2="347" y2="279" stroke="white" stroke-width="2.2"/>
  <line x1="347" y1="265" x2="333" y2="279" stroke="white" stroke-width="2.2"/>
  <text x="400" y="268" font-size="13" fill="#9E9E9E" font-weight="bold">Pod 3</text>
  <text x="400" y="283" font-size="11" fill="#E53935">Terminating</text>

  <!-- Downtime badge -->
  <rect x="320" y="318" width="160" height="22" rx="11" fill="#E53935"/>
  <text x="400" y="333" text-anchor="middle" font-size="11" font-weight="bold" fill="white">SERVICE INDISPONIBLE</text>

  <!-- Arrow 2 → 3 -->
  <line x1="515" y1="200" x2="545" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- ══════════════════════════════
       Step 3 : Démarrage v2
  ══════════════════════════════ -->
  <rect x="550" y="60" width="220" height="290" rx="10" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="550" y="60" width="220" height="35" rx="10" fill="#4CAF50"/>
  <rect x="550" y="85" width="220" height="10" fill="#4CAF50"/>
  <text x="660" y="84" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Etape 3 : Démarrage v2</text>

  <rect x="575" y="115" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="600" cy="142" r="15" fill="#4CAF50"/>
  <text x="600" y="147" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v2</text>
  <text x="660" y="138" font-size="13" fill="#333" font-weight="bold">Pod 1</text>
  <text x="660" y="153" font-size="11" fill="#4CAF50">version 2</text>

  <rect x="575" y="180" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="600" cy="207" r="15" fill="#4CAF50"/>
  <text x="600" y="212" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v2</text>
  <text x="660" y="203" font-size="13" fill="#333" font-weight="bold">Pod 2</text>
  <text x="660" y="218" font-size="11" fill="#4CAF50">version 2</text>

  <rect x="575" y="245" width="170" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="600" cy="272" r="15" fill="#4CAF50"/>
  <text x="600" y="277" text-anchor="middle" font-size="10" fill="white" font-weight="bold">v2</text>
  <text x="660" y="268" font-size="13" fill="#333" font-weight="bold">Pod 3</text>
  <text x="660" y="283" font-size="11" fill="#4CAF50">version 2</text>

  <!-- Bottom note -->
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#666">Downtime inévitable : tous les pods v1 sont supprimés avant de démarrer les pods v2</text>
  <rect x="72" y="362" width="656" height="20" rx="4" fill="none" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
