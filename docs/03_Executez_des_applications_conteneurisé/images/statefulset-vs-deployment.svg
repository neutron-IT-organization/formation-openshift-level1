<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="820" height="380" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A1A2E">Deployment vs StatefulSet</text>

  <!-- Deployment side -->
  <rect x="30" y="60" width="360" height="300" rx="10" fill="#E3F2FD" stroke="#326CE5" stroke-width="2"/>
  <text x="210" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#326CE5">Deployment</text>
  <text x="210" y="110" text-anchor="middle" font-size="12" fill="#555">Pods interchangeables, noms aléatoires</text>

  <!-- Deployment pods -->
  <rect x="55" y="130" width="90" height="50" rx="8" fill="#326CE5"/>
  <text x="100" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">app-7f4x</text>
  <text x="100" y="173" text-anchor="middle" font-size="10" fill="#BBD" >Pod 1</text>

  <rect x="165" y="130" width="90" height="50" rx="8" fill="#326CE5"/>
  <text x="210" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">app-2k9p</text>
  <text x="210" y="173" text-anchor="middle" font-size="10" fill="#BBD">Pod 2</text>

  <rect x="275" y="130" width="90" height="50" rx="8" fill="#326CE5"/>
  <text x="320" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">app-m3nz</text>
  <text x="320" y="173" text-anchor="middle" font-size="10" fill="#BBD">Pod 3</text>

  <!-- Shared volume under Deployment -->
  <rect x="110" y="215" width="160" height="40" rx="6" fill="#BBDEFB" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="190" y="239" text-anchor="middle" font-size="12" fill="#1565C0">Volume partagé (optionnel)</text>

  <!-- Lines deployment to volume -->
  <line x1="100" y1="180" x2="150" y2="215" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="210" y1="180" x2="190" y2="215" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="320" y1="180" x2="245" y2="215" stroke="#326CE5" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Deployment characteristics -->
  <text x="55" y="285" font-size="12" fill="#333">✅ Démarrage simultané des pods</text>
  <text x="55" y="305" font-size="12" fill="#333">✅ Noms de pods aléatoires</text>
  <text x="55" y="325" font-size="12" fill="#333">✅ Pas d'identité stable</text>
  <text x="55" y="345" font-size="12" fill="#0D47A1">→ Idéal pour apps sans état (web, API)</text>

  <!-- StatefulSet side -->
  <rect x="430" y="60" width="360" height="300" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="610" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">StatefulSet</text>
  <text x="610" y="110" text-anchor="middle" font-size="12" fill="#555">Pods ordonnés, noms stables, PVC propre</text>

  <!-- StatefulSet pods -->
  <rect x="455" y="130" width="90" height="50" rx="8" fill="#4CAF50"/>
  <text x="500" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">mysql-0</text>
  <text x="500" y="173" text-anchor="middle" font-size="10" fill="#CEC">Premier</text>

  <rect x="565" y="130" width="90" height="50" rx="8" fill="#4CAF50"/>
  <text x="610" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">mysql-1</text>
  <text x="610" y="173" text-anchor="middle" font-size="10" fill="#CEC">Deuxième</text>

  <rect x="675" y="130" width="90" height="50" rx="8" fill="#4CAF50"/>
  <text x="720" y="158" text-anchor="middle" font-size="12" fill="white" font-weight="bold">mysql-2</text>
  <text x="720" y="173" text-anchor="middle" font-size="10" fill="#CEC">Troisième</text>

  <!-- Individual PVCs under StatefulSet -->
  <rect x="460" y="210" width="80" height="36" rx="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="500" y="231" text-anchor="middle" font-size="11" fill="#1B5E20">PVC-0</text>
  <text x="500" y="243" text-anchor="middle" font-size="10" fill="#2E7D32">1Gi</text>

  <rect x="570" y="210" width="80" height="36" rx="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="610" y="231" text-anchor="middle" font-size="11" fill="#1B5E20">PVC-1</text>
  <text x="610" y="243" text-anchor="middle" font-size="10" fill="#2E7D32">1Gi</text>

  <rect x="680" y="210" width="80" height="36" rx="6" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="720" y="231" text-anchor="middle" font-size="11" fill="#1B5E20">PVC-2</text>
  <text x="720" y="243" text-anchor="middle" font-size="10" fill="#2E7D32">1Gi</text>

  <!-- Lines StatefulSet to PVCs -->
  <line x1="500" y1="180" x2="500" y2="210" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="610" y1="180" x2="610" y2="210" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="720" y1="180" x2="720" y2="210" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- StatefulSet characteristics -->
  <text x="455" y="285" font-size="12" fill="#333">✅ Démarrage ordonné (0, 1, 2...)</text>
  <text x="455" y="305" font-size="12" fill="#333">✅ Noms stables et prédictibles</text>
  <text x="455" y="325" font-size="12" fill="#333">✅ PVC unique par pod (données isolées)</text>
  <text x="455" y="345" font-size="12" fill="#1B5E20">→ Idéal pour bases de données</text>
</svg>
