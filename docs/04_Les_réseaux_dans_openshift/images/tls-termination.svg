<svg viewBox="0 0 740 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="740" height="220" fill="#F8F9FA" rx="12"/>
  <text x="370" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1A2E">TLS Edge Termination</text>

  <!-- Client -->
  <rect x="20" y="70" width="110" height="80" rx="10" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <text x="75" y="105" text-anchor="middle" font-size="24">💻</text>
  <text x="75" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Client</text>
  <text x="75" y="143" text-anchor="middle" font-size="10" fill="#BF360C">Navigateur</text>

  <!-- HTTPS arrow with lock -->
  <line x1="130" y1="110" x2="230" y2="110" stroke="#4CAF50" stroke-width="3" marker-end="url(#arrowGreen2)"/>
  <text x="180" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">🔒 HTTPS chiffré</text>

  <!-- OpenShift Router -->
  <rect x="230" y="55" width="160" height="110" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="310" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">OpenShift</text>
  <text x="310" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">Router</text>
  <text x="310" y="122" text-anchor="middle" font-size="11" fill="#283593">🔓 Déchiffrement TLS</text>
  <text x="310" y="138" text-anchor="middle" font-size="10" fill="#3949AB">Terminaison = Edge</text>
  <text x="310" y="153" text-anchor="middle" font-size="10" fill="#3949AB">Port 443 → 80</text>

  <!-- HTTP arrow (no lock) -->
  <line x1="390" y1="110" x2="490" y2="110" stroke="#FF7043" stroke-width="3" marker-end="url(#arrowRed2)"/>
  <text x="440" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#BF360C">HTTP non chiffré</text>
  <text x="440" y="128" text-anchor="middle" font-size="10" fill="#FF5722">(réseau interne)</text>

  <!-- Pod -->
  <rect x="490" y="70" width="120" height="80" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="550" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Pod</text>
  <text x="550" y="120" text-anchor="middle" font-size="11" fill="#2E7D32">Application</text>
  <text x="550" y="136" text-anchor="middle" font-size="10" fill="#388E3C">port: 5000</text>

  <!-- Network boundary line -->
  <line x1="225" y1="45" x2="225" y2="185" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="130" y="55" text-anchor="middle" font-size="10" fill="#616161">Réseau public</text>
  <text x="480" y="55" text-anchor="middle" font-size="10" fill="#616161">Réseau interne cluster</text>

  <!-- Summary box -->
  <rect x="20" y="180" width="700" height="30" rx="6" fill="#E3F2FD"/>
  <text x="370" y="200" text-anchor="middle" font-size="11" fill="#1565C0">✅ Edge : TLS terminé au router — le pod reçoit HTTP simple. Simple à configurer, idéal pour la plupart des applications web.</text>

  <defs>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4CAF50"/>
    </marker>
    <marker id="arrowRed2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF7043"/>
    </marker>
  </defs>
</svg>
