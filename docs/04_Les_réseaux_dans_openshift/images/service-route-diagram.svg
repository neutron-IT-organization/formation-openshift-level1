<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="300" fill="#F8F9FA" rx="12"/>
  <text x="410" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Du navigateur au pod : Route → Service → Pod</text>

  <!-- Internet / Browser -->
  <rect x="20" y="100" width="110" height="80" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="75" y="136" text-anchor="middle" font-size="28">🌐</text>
  <text x="75" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Navigateur</text>
  <text x="75" y="175" text-anchor="middle" font-size="10" fill="#BF360C">Internet</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="140" x2="170" y2="140" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="150" y="130" text-anchor="middle" font-size="10" fill="#E65100">HTTPS</text>

  <!-- Route -->
  <rect x="170" y="90" width="150" height="100" rx="10" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
  <text x="245" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#880E4F">Route</text>
  <text x="245" y="142" text-anchor="middle" font-size="10" fill="#AD1457">app.apps.cluster.fr</text>
  <text x="245" y="157" text-anchor="middle" font-size="10" fill="#AD1457">TLS edge / redirect</text>
  <text x="245" y="175" text-anchor="middle" font-size="10" fill="#880E4F">OpenShift Router</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="140" x2="360" y2="140" stroke="#E91E63" stroke-width="2.5" marker-end="url(#arrowPink)"/>
  <text x="340" y="130" text-anchor="middle" font-size="10" fill="#880E4F">HTTP</text>

  <!-- Service -->
  <rect x="360" y="90" width="150" height="100" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="435" y="123" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">Service</text>
  <text x="435" y="142" text-anchor="middle" font-size="10" fill="#283593">ClusterIP</text>
  <text x="435" y="157" text-anchor="middle" font-size="10" fill="#283593">172.30.x.x:80</text>
  <text x="435" y="175" text-anchor="middle" font-size="10" fill="#1A237E">Load balancing</text>

  <!-- Arrows 3a & 3b -->
  <line x1="510" y1="120" x2="555" y2="100" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="510" y1="160" x2="555" y2="200" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Pods -->
  <rect x="555" y="60" width="120" height="70" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="615" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Pod 1</text>
  <text x="615" y="105" text-anchor="middle" font-size="10" fill="#2E7D32">app=olympic-medals</text>
  <text x="615" y="120" text-anchor="middle" font-size="10" fill="#388E3C">port: 5000</text>

  <rect x="555" y="170" width="120" height="70" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="615" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Pod 2</text>
  <text x="615" y="215" text-anchor="middle" font-size="10" fill="#2E7D32">app=olympic-medals</text>
  <text x="615" y="230" text-anchor="middle" font-size="10" fill="#388E3C">port: 5000</text>

  <!-- Namespace box -->
  <rect x="345" y="55" width="350" height="225" rx="10" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="695" y="72" text-anchor="middle" font-size="11" fill="#7B1FA2">Namespace</text>

  <!-- Legend bottom -->
  <text x="20" y="265" font-size="11" fill="#555">1. Le navigateur envoie une requête HTTPS vers la Route</text>
  <text x="20" y="282" font-size="11" fill="#555">2. La Route redirige vers le Service (HTTP interne)</text>
  <text x="420" y="265" font-size="11" fill="#555">3. Le Service répartit la charge entre les pods</text>
  <text x="420" y="282" font-size="11" fill="#555">4. L'un des pods traite la requête</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF9800"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E91E63"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3F51B5"/>
    </marker>
  </defs>
</svg>
