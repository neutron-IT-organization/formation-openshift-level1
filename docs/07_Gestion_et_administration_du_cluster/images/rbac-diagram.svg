<svg viewBox="0 0 820 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="380" fill="#F8F9FA" rx="12"/>
  <text x="410" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Modèle RBAC dans OpenShift</text>

  <!-- User/ServiceAccount -->
  <rect x="20" y="60" width="130" height="260" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="85" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Identité</text>
  <rect x="35" y="100" width="100" height="40" rx="6" fill="#1565C0"/>
  <text x="85" y="122" text-anchor="middle" font-size="12" fill="white">👤 user1</text>
  <text x="85" y="136" text-anchor="middle" font-size="9" fill="#BBDEFB">view role</text>
  <rect x="35" y="150" width="100" height="40" rx="6" fill="#1565C0"/>
  <text x="85" y="172" text-anchor="middle" font-size="12" fill="white">👤 user2</text>
  <text x="85" y="186" text-anchor="middle" font-size="9" fill="#BBDEFB">edit role</text>
  <rect x="35" y="200" width="100" height="40" rx="6" fill="#1565C0"/>
  <text x="85" y="222" text-anchor="middle" font-size="12" fill="white">👤 admin</text>
  <text x="85" y="236" text-anchor="middle" font-size="9" fill="#BBDEFB">admin role</text>
  <rect x="35" y="250" width="100" height="40" rx="6" fill="#0D47A1"/>
  <text x="85" y="272" text-anchor="middle" font-size="12" fill="white">🤖 ServiceAccount</text>
  <text x="85" y="286" text-anchor="middle" font-size="9" fill="#BBDEFB">pour les pods</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="190" x2="190" y2="190" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue5)"/>

  <!-- RoleBinding -->
  <rect x="190" y="80" width="150" height="220" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="265" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">RoleBinding</text>
  <text x="265" y="119" text-anchor="middle" font-size="10" fill="#3949AB">(dans 1 namespace)</text>
  <rect x="205" y="130" width="120" height="30" rx="5" fill="#3F51B5"/>
  <text x="265" y="150" text-anchor="middle" font-size="11" fill="white">user1 → view</text>
  <rect x="205" y="168" width="120" height="30" rx="5" fill="#3F51B5"/>
  <text x="265" y="188" text-anchor="middle" font-size="11" fill="white">user2 → edit</text>
  <rect x="205" y="206" width="120" height="30" rx="5" fill="#3F51B5"/>
  <text x="265" y="226" text-anchor="middle" font-size="11" fill="white">admin → admin</text>

  <!-- ClusterRoleBinding -->
  <rect x="190" y="310" width="150" height="55" rx="8" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="265" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A237E">ClusterRoleBinding</text>
  <text x="265" y="347" text-anchor="middle" font-size="10" fill="#3949AB">(tout le cluster)</text>
  <text x="265" y="358" text-anchor="middle" font-size="10" fill="#3949AB">ex: cluster-admin</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="190" x2="380" y2="190" stroke="#3F51B5" stroke-width="2" marker-end="url(#arrowIndigo)"/>

  <!-- Role -->
  <rect x="380" y="60" width="160" height="255" rx="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="460" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Role / ClusterRole</text>
  <rect x="395" y="95" width="130" height="55" rx="6" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="460" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">view</text>
  <text x="460" y="131" text-anchor="middle" font-size="10" fill="#F57C00">get, list, watch</text>
  <text x="460" y="144" text-anchor="middle" font-size="10" fill="#F57C00">lecture seule</text>

  <rect x="395" y="158" width="130" height="55" rx="6" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="460" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">edit</text>
  <text x="460" y="194" text-anchor="middle" font-size="10" fill="#F57C00">+ create, update, delete</text>
  <text x="460" y="207" text-anchor="middle" font-size="10" fill="#F57C00">lecture + écriture</text>

  <rect x="395" y="221" width="130" height="55" rx="6" fill="#FFF8E1" stroke="#FFB300" stroke-width="1.5"/>
  <text x="460" y="241" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">admin</text>
  <text x="460" y="257" text-anchor="middle" font-size="10" fill="#F57C00">+ gérer RBAC namespace</text>
  <text x="460" y="270" text-anchor="middle" font-size="10" fill="#F57C00">tout dans le namespace</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="190" x2="580" y2="190" stroke="#F57C00" stroke-width="2" marker-end="url(#arrowOrange5)"/>

  <!-- Resources -->
  <rect x="580" y="60" width="210" height="260" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="685" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Ressources</text>
  <text x="685" y="100" text-anchor="middle" font-size="10" fill="#2E7D32">ce que l'utilisateur peut faire</text>

  <rect x="595" y="112" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="130" text-anchor="middle" font-size="11" fill="#1B5E20">📦 Pods</text>
  <rect x="595" y="144" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="162" text-anchor="middle" font-size="11" fill="#1B5E20">🌐 Services &amp; Routes</text>
  <rect x="595" y="176" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="194" text-anchor="middle" font-size="11" fill="#1B5E20">🚀 Deployments</text>
  <rect x="595" y="208" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="226" text-anchor="middle" font-size="11" fill="#1B5E20">💾 PVCs, ConfigMaps</text>
  <rect x="595" y="240" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="258" text-anchor="middle" font-size="11" fill="#1B5E20">🔒 Secrets</text>
  <rect x="595" y="272" width="180" height="26" rx="5" fill="#A5D6A7"/>
  <text x="685" y="290" text-anchor="middle" font-size="11" fill="#1B5E20">⚙ RoleBindings (admin)</text>

  <!-- Bottom note -->
  <rect x="20" y="345" width="780" height="28" rx="8" fill="#E3F2FD"/>
  <text x="410" y="363" text-anchor="middle" font-size="11" fill="#1565C0">Utilisateur → RoleBinding → Role → Autorisations sur les Ressources du Namespace</text>

  <defs>
    <marker id="arrowBlue5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3F51B5"/>
    </marker>
    <marker id="arrowOrange5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F57C00"/>
    </marker>
  </defs>
</svg>
