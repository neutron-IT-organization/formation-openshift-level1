  <rect x="236" y="130" width="40" height="360" rx="4" fill="#1b1d21"/>
  <text x="244" y="152" font-family="monospace" font-size="11" fill="#585858">1</text>
  <text x="244" y="168" font-family="monospace" font-size="11" fill="#585858">2</text>
  <text x="244" y="184" font-family="monospace" font-size="11" fill="#585858">3</text>
  <text x="244" y="200" font-family="monospace" font-size="11" fill="#585858">4</text>
  <text x="244" y="216" font-family="monospace" font-size="11" fill="#585858">5</text>
  <text x="244" y="232" font-family="monospace" font-size="11" fill="#585858">6</text>
  <text x="244" y="248" font-family="monospace" font-size="11" fill="#585858">7</text>
  <text x="244" y="264" font-family="monospace" font-size="11" fill="#585858">8</text>
  <text x="244" y="280" font-family="monospace" font-size="11" fill="#585858">9</text>
  <text x="240" y="296" font-family="monospace" font-size="11" fill="#585858">10</text>
  <text x="240" y="312" font-family="monospace" font-size="11" fill="#585858">11</text>
  <text x="240" y="328" font-family="monospace" font-size="11" fill="#585858">12</text>
  <text x="240" y="344" font-family="monospace" font-size="11" fill="#585858">13</text>
  <text x="240" y="360" font-family="monospace" font-size="11" fill="#585858">14</text>
  <text x="240" y="376" font-family="monospace" font-size="11" fill="#585858">15</text>
  <text x="240" y="392" font-family="monospace" font-size="11" fill="#585858">16</text>
  <text x="240" y="408" font-family="monospace" font-size="11" fill="#585858">17</text>
  <text x="240" y="424" font-family="monospace" font-size="11" fill="#585858">18</text>
  <text x="240" y="440" font-family="monospace" font-size="11" fill="#585858">19</text>
  <text x="240" y="456" font-family="monospace" font-size="11" fill="#585858">20</text>
  <text x="240" y="472" font-family="monospace" font-size="11" fill="#585858">21</text>
  <text x="240" y="488" font-family="monospace" font-size="11" fill="#585858">22</text>

  <!-- YAML content -->
  <!-- Line 1: apiVersion -->
  <text x="286" y="152" font-family="monospace" font-size="12" fill="#9cdcfe">apiVersion</text>
  <text x="364" y="152" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="376" y="152" font-family="monospace" font-size="12" fill="#ce9178">apps/v1</text>

  <!-- Line 2: kind -->
  <text x="286" y="168" font-family="monospace" font-size="12" fill="#9cdcfe">kind</text>
  <text x="318" y="168" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="330" y="168" font-family="monospace" font-size="12" fill="#4ec9b0">Deployment</text>

  <!-- Line 3: metadata -->
  <text x="286" y="184" font-family="monospace" font-size="12" fill="#9cdcfe">metadata</text>
  <text x="342" y="184" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 4: name -->
  <text x="298" y="200" font-family="monospace" font-size="12" fill="#9cdcfe">  name</text>
  <text x="330" y="200" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="342" y="200" font-family="monospace" font-size="12" fill="#ce9178">hello-openshift</text>

  <!-- Line 5: namespace -->
  <text x="298" y="216" font-family="monospace" font-size="12" fill="#9cdcfe">  namespace</text>
  <text x="366" y="216" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="378" y="216" font-family="monospace" font-size="12" fill="#ce9178">console-exploration-prague</text>

  <!-- Line 6: labels -->
  <text x="298" y="232" font-family="monospace" font-size="12" fill="#9cdcfe">  labels</text>
  <text x="334" y="232" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 7: app label -->
  <text x="310" y="248" font-family="monospace" font-size="12" fill="#9cdcfe">    app</text>
  <text x="334" y="248" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="346" y="248" font-family="monospace" font-size="12" fill="#ce9178">hello-openshift</text>

  <!-- Line 8: spec -->
  <text x="286" y="264" font-family="monospace" font-size="12" fill="#9cdcfe">spec</text>
  <text x="312" y="264" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 9: replicas -->
  <text x="298" y="280" font-family="monospace" font-size="12" fill="#9cdcfe">  replicas</text>
  <text x="354" y="280" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="366" y="280" font-family="monospace" font-size="12" fill="#b5cea8">1</text>

  <!-- Line 10: selector -->
  <text x="298" y="296" font-family="monospace" font-size="12" fill="#9cdcfe">  selector</text>
  <text x="354" y="296" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 11: matchLabels -->
  <text x="310" y="312" font-family="monospace" font-size="12" fill="#9cdcfe">    matchLabels</text>
  <text x="394" y="312" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 12: app matchlabel -->
  <text x="322" y="328" font-family="monospace" font-size="12" fill="#9cdcfe">      app</text>
  <text x="358" y="328" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="370" y="328" font-family="monospace" font-size="12" fill="#ce9178">hello-openshift</text>

  <!-- Line 13: template -->
  <text x="298" y="344" font-family="monospace" font-size="12" fill="#9cdcfe">  template</text>
  <text x="354" y="344" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 14: template metadata -->
  <text x="310" y="360" font-family="monospace" font-size="12" fill="#9cdcfe">    metadata</text>
  <text x="370" y="360" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 15: template labels -->
  <text x="322" y="376" font-family="monospace" font-size="12" fill="#9cdcfe">      labels</text>
  <text x="370" y="376" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 16: template app label -->
  <text x="334" y="392" font-family="monospace" font-size="12" fill="#9cdcfe">        app</text>
  <text x="376" y="392" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="388" y="392" font-family="monospace" font-size="12" fill="#ce9178">hello-openshift</text>

  <!-- Line 17: spec -->
  <text x="310" y="408" font-family="monospace" font-size="12" fill="#9cdcfe">    spec</text>
  <text x="334" y="408" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 18: containers -->
  <text x="322" y="424" font-family="monospace" font-size="12" fill="#9cdcfe">      containers</text>
  <text x="406" y="424" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 19: container name -->
  <text x="334" y="440" font-family="monospace" font-size="12" fill="#d4d4d4">      - </text>
  <text x="358" y="440" font-family="monospace" font-size="12" fill="#9cdcfe">name</text>
  <text x="382" y="440" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="394" y="440" font-family="monospace" font-size="12" fill="#ce9178">hello-openshift</text>

  <!-- Line 20: image -->
  <text x="346" y="456" font-family="monospace" font-size="12" fill="#9cdcfe">        image</text>
  <text x="394" y="456" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="406" y="456" font-family="monospace" font-size="12" fill="#ce9178">quay.io/openshift/origin-hello-openshift:latest</text>

  <!-- Line 21: ports -->
  <text x="346" y="472" font-family="monospace" font-size="12" fill="#9cdcfe">        ports</text>
  <text x="394" y="472" font-family="monospace" font-size="12" fill="#d4d4d4">:</text>

  <!-- Line 22: containerPort -->
  <text x="358" y="488" font-family="monospace" font-size="12" fill="#d4d4d4">        - </text>
  <text x="382" y="488" font-family="monospace" font-size="12" fill="#9cdcfe">containerPort</text>
  <text x="466" y="488" font-family="monospace" font-size="12" fill="#d4d4d4">: </text>
  <text x="478" y="488" font-family="monospace" font-size="12" fill="#b5cea8">8080</text>

  <!-- Action buttons at the bottom -->
  <rect x="236" y="502" width="80" height="32" rx="4" fill="#202cac"/>
  <text x="264" y="522" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Create</text>

  <rect x="326" y="502" width="80" height="32" rx="4" fill="transparent" stroke="#6a6e73" stroke-width="1"/>
  <text x="350" y="522" font-family="sans-serif" font-size="13" fill="#c9c9c9">Cancel</text>
</svg>
