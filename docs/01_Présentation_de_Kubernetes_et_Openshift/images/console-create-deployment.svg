  <rect x="4" y="126" width="212" height="24" rx="3" fill="#1f2937"/>
  <text x="18" y="142" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">Workloads</text>

  <!-- Deployments - active highlighted item -->
  <rect x="4" y="152" width="212" height="24" rx="3" fill="#202cac"/>
  <text x="30" y="168" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Deployments</text>

  <!-- Other workload items -->
  <text x="30" y="196" font-family="sans-serif" font-size="12" fill="#8a8d93">Pods</text>
  <text x="30" y="218" font-family="sans-serif" font-size="12" fill="#8a8d93">ReplicaSets</text>
  <text x="30" y="240" font-family="sans-serif" font-size="12" fill="#8a8d93">StatefulSets</text>
  <text x="30" y="262" font-family="sans-serif" font-size="12" fill="#8a8d93">DaemonSets</text>
  <text x="30" y="284" font-family="sans-serif" font-size="12" fill="#8a8d93">Jobs</text>
  <text x="30" y="306" font-family="sans-serif" font-size="12" fill="#8a8d93">CronJobs</text>

  <!-- Networking -->
  <text x="18" y="338" font-family="sans-serif" font-size="13" fill="#8a8d93">Networking</text>
  <text x="30" y="360" font-family="sans-serif" font-size="12" fill="#8a8d93">Services</text>
  <text x="30" y="382" font-family="sans-serif" font-size="12" fill="#8a8d93">Routes</text>
  <text x="30" y="404" font-family="sans-serif" font-size="12" fill="#8a8d93">Ingresses</text>

  <!-- Storage -->
  <text x="18" y="436" font-family="sans-serif" font-size="13" fill="#8a8d93">Storage</text>

  <!-- Observe -->
  <text x="18" y="468" font-family="sans-serif" font-size="13" fill="#8a8d93">Observe</text>

  <!-- Administration -->
