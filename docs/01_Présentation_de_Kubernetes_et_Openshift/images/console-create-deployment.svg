  <text x="308" y="76" font-family="sans-serif" font-size="12" fill="#8a8d93"> &gt; </text>
  <text x="326" y="76" font-family="sans-serif" font-size="12" fill="#8a8d93">Deployments</text>
  <text x="410" y="76" font-family="sans-serif" font-size="12" fill="#8a8d93"> &gt; </text>
  <text x="428" y="76" font-family="sans-serif" font-size="12" fill="#c9c9c9">Create Deployment</text>

  <!-- Page title -->
